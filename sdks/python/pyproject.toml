[project]
name = "husk-client"
version = "0.0.1"
description = "Auto-generated Python client for the Husk control plane API"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [{ name = "Husk Contributors" }]

dependencies = [
    "httpx>=0.27",
    "pydantic>=2.7",
    "attrs>=23.0",
    "python-dateutil>=2.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["husk_client"]
